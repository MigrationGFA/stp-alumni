name: Mirror to Account A (Debug)

on:
  push:
    branches:
      - "**"  # trigger on all branches

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Account A (Debug Mode)
        env:
          TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          # --- Debugging Steps ---
          if [ -z "$TOKEN" ]; then
            echo "ERROR: MIRROR_TOKEN is not set!"
            exit 1
          fi
          echo "Token starts with: ${TOKEN:0:4}..."

          # Check token info from GitHub API
          echo "Token permissions:"
          curl -s -H "Authorization: token ${TOKEN}" \
           -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/user/installations || echo "Cannot get token permissions"
            
          # --- Git Push to Mirror Repo ---
          echo "Adding mirror remote..."
          git remote add mirror https://x-access-token:${TOKEN}@github.com/DEV-TNK/stp-alumni.git

          echo "Pushing all branches..."
          git push mirror --force --all

          echo "Pushing all tags..."
          git push mirror --tags
